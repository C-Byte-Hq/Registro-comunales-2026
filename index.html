<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - Juegos Comunales Palacio del Deporte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card-header-custom {
            background-color: #0d6efd;
            color: white;
        }
        .tabla-contenedor {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="container my-5">
        <div class="card mb-5 shadow-sm">
            <div class="card-header card-header-custom py-3">
                <h4 class="mb-0" id="formTitulo">Formulario de Inscripción Oficial</h4>
            </div>
            <div class="card-body p-4">
                <form id="formularioInscripcion" onsubmit="event.preventDefault(); procesarInscripcion();">
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Comuna / Comunidad</label>
                            <input type="text" id="comuna" class="form-control" required placeholder="Ej. El Paso">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Disciplina Deportiva</label>
                            <input type="text" id="disciplina" class="form-control" required placeholder="Ej. Fútbol Sala">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Categoría</label>
                            <input type="text" id="categoria" class="form-control" required placeholder="Ej. Sub-12">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Nombre del Delegado</label>
                            <input type="text" id="delegado" class="form-control" required placeholder="Nombre Completo">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cédula del Delegado</label>
                            <input type="text" id="cedulaDelegado" class="form-control" required placeholder="V-00000000">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Teléfono del Delegado</label>
                            <input type="text" id="telDelegado" class="form-control" required placeholder="04XX-0000000">
                        </div>
                    </div>

                    <hr class="my-4">
                    <h5>Nómina de Atletas</h5>
                    <div id="contenedorAtletas" class="mb-4">
                        <div class="row g-2 mb-2 atleta-fila">
                            <div class="col-md-2">
                                <input type="text" class="form-control atleta-cedula" placeholder="Cédula Atleta" required>
                            </div>
                            <div class="col-md-3">
                                <input type="text" class="form-control atleta-nombre" placeholder="Nombre Completo" required>
                            </div>
                            <div class="col-md-1">
                                <input type="number" class="form-control atleta-edad" placeholder="Edad" required min="1">
                            </div>
                            <div class="col-md-2">
                                <input type="text" class="form-control atleta-telRep" placeholder="Tel. Representante">
                            </div>
                            <div class="col-md-2">
                                <input type="text" class="form-control atleta-direccion" placeholder="Dirección" required>
                            </div>
                            <div class="col-md-2">
                                <input type="text" class="form-control atleta-colegio" placeholder="Institución Educativa" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="button" class="btn btn-secondary" onclick="agregarFilaAtleta()">+ Agregar Atleta</button>
                        <button type="submit" id="btnFinalizarRegistro" class="btn btn-primary px-5">Finalizar Registro</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="tabla-contenedor">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0 text-secondary">Nóminas Registradas - Palacio del Deporte</h3>
                <button class="btn btn-success" onclick="exportarExcelFiltrado()">Descargar Reporte Excel (.xlsx)</button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle" id="tablaAtletasMaestra">
                    <thead class="table-dark">
                        <tr>
                            <th>Comuna</th>
                            <th>Disciplina</th>
                            <th>Categoría</th>
                            <th>Delegado</th>
                            <th>Cédula Del.</th>
                            <th>Teléfono Del.</th>
                            <th>Cédula Atleta</th>
                            <th>Nombre Atleta</th>
                            <th>Edad</th>
                            <th class="no-exportar">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAtletasCuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // URL activa del túnel de Cloudflare
        const URL_SERVIDOR = "https://rom-distribution-operate-appear.trycloudflare.com";

        // Variables de persistencia temporal para Modificación
        let modoEdicionActive = false;
        let comunaOriginalGlobal = "";
        let disciplinaOriginalGlobal = "";
        let categoriaOriginalGlobal = "";

        // Inicializar datos al cargar la interfaz
        document.addEventListener("DOMContentLoaded", () => {
            obtenerAtletasPalacio();
        });

        /**
         * LÓGICA: Consultar Servidor y Pintar Datos del JSON
         */
        function obtenerAtletasPalacio() {
            fetch(`${URL_SERVIDOR}/api/atletas-comunales`)
                .then(res => res.json())
                .then(datos => {
                    const tabla = document.getElementById("tablaAtletasCuerpo");
                    tabla.innerHTML = "";

                    if (!datos || datos.length === 0) {
                        tabla.innerHTML = `<tr><td colspan="10" class="text-center text-muted py-4">No hay nóminas registradas en el sistema local.</td></tr>`;
                        return;
                    }

                    datos.forEach(registro => {
                        registro.atletas.forEach((atleta, index) => {
                            const fila = document.createElement("tr");
                            fila.innerHTML = `
                                <td>${registro.comuna}</td>
                                <td>${registro.disciplina}</td>
                                <td>${registro.categoria}</td>
                                <td>${registro.delegado}</td>
                                <td>${registro.cedulaDelegado || 'N/R'}</td>
                                <td>${registro.telDelegado}</td>
                                <td>${atleta.cedula}</td>
                                <td>${atleta.nombre}</td>
                                <td>${atleta.edad}</td>
                                <td>
                                    ${index === 0 ? `
                                        <button class="btn btn-warning btn-sm me-1" onclick="cargarFormularioEdicion('${empaquetarRegistro(registro)}')">Editar</button>
                                        <button class="btn btn-danger btn-sm" onclick="eliminarInscripcion('${escaparString(registro.comuna)}', '${escaparString(registro.disciplina)}', '${escaparString(registro.categoria)}')">Eliminar</button>
                                    ` : ''}
                                </td>
                            `;
                            tabla.appendChild(fila);
                        });
                    });
                })
                .catch(err => console.error("Error al refrescar tabla del Palacio:", err));
        }

        // Serializar objetos para incrustarlos en botones sin romper las comillas HTML
        function empaquetarRegistro(obj) {
            return encodeURIComponent(JSON.stringify(obj));
        }

        function escaparString(str) {
            return str.replace(/'/g, "\\'");
        }

        /**
         * LÓGICA: Agregar dinámicamente campos para nuevos atletas
         */
        function agregarFilaAtleta() {
            const contenedor = document.getElementById("contenedorAtletas");
            const nuevaFila = document.createElement("div");
            nuevaFila.className = "row g-2 mb-2 atleta-fila";
            nuevaFila.innerHTML = `
                <div class="col-md-2"><input type="text" class="form-control atleta-cedula" placeholder="Cédula Atleta" required></div>
                <div class="col-md-3"><input type="text" class="form-control atleta-nombre" placeholder="Nombre Completo" required></div>
                <div class="col-md-1"><input type="number" class="form-control atleta-edad" placeholder="Edad" required min="1"></div>
                <div class="col-md-2"><input type="text" class="form-control atleta-telRep" placeholder="Tel. Representante"></div>
                <div class="col-md-2"><input type="text" class="form-control atleta-direccion" placeholder="Dirección" required></div>
                <div class="col-md-2"><input type="text" class="form-control atleta-colegio" placeholder="Institución Educativa" required></div>
            `;
            contenedor.appendChild(nuevaFila);
        }

        /**
         * LÓGICA: Mapear inputs de atletas de la interfaz hacia un Array estructurado
         */
        function obtenerListaAtletas() {
            const filas = document.querySelectorAll(".atleta-fila");
            const lista = [];
            filas.forEach(fila => {
                const cedula = fila.querySelector(".atleta-cedula").value;
                const nombre = fila.querySelector(".atleta-nombre").value;
                const edad = fila.querySelector(".atleta-edad").value;
                const telRep = fila.querySelector(".atleta-telRep").value;
                const direccion = fila.querySelector(".atleta-direccion").value;
                const colegio = fila.querySelector(".atleta-colegio").value;

                if (cedula && nombre) {
                    lista.push({ cedula, nombre, edad, telRep, direccion, colegio });
                }
            });
            return lista;
        }

        /**
         * LÓGICA: Cargar una nómina completa en el formulario para modificarla
         */
        function cargarFormularioEdicion(datosEmpaquetados) {
            const registro = JSON.parse(decodeURIComponent(datosEmpaquetados));
            
            modoEdicionActive = true;
            comunaOriginalGlobal = registro.comuna;
            disciplinaOriginalGlobal = registro.disciplina;
            categoriaOriginalGlobal = registro.categoria;

            // Rellenar cabecera del formulario
            document.getElementById('comuna').value = registro.comuna;
            document.getElementById('disciplina').value = registro.disciplina;
            document.getElementById('categoria').value = registro.categoria;
            document.getElementById('delegado').value = registro.delegado;
            document.getElementById('cedulaDelegado').value = registro.cedulaDelegado || "";
            document.getElementById('telDelegado').value = registro.telDelegado;

            // Reconstruir bloque de filas de atletas
            const contenedor = document.getElementById("contenedorAtletas");
            contenedor.innerHTML = "";
            
            registro.atleta = registro.atletas || [];
            registro.atleta.forEach(a => {
                const fila = document.createElement("div");
                fila.className = "row g-2 mb-2 atleta-fila";
                fila.innerHTML = `
                    <div class="col-md-2"><input type="text" class="form-control atleta-cedula" value="${a.cedula}" required></div>
                    <div class="col-md-3"><input type="text" class="form-control atleta-nombre" value="${a.nombre}" required></div>
                    <div class="col-md-1"><input type="number" class="form-control atleta-edad" value="${a.edad}" required></div>
                    <div class="col-md-2"><input type="text" class="form-control atleta-telRep" value="${a.telRep || ''}"></div>
                    <div class="col-md-2"><input type="text" class="form-control atleta-direccion" value="${a.direccion || ''}" required></div>
                    <div class="col-md-2"><input type="text" class="form-control atleta-colegio" value="${a.colegio || ''}" required></div>
                `;
                contenedor.appendChild(fila);
            });

            document.getElementById('formTitulo').innerText = "Modificando Nómina Registrada";
            document.getElementById('btnFinalizarRegistro').innerText = "Guardar Cambios (Modificar)";
            document.getElementById('btnFinalizarRegistro').className = "btn btn-warning px-5";
            window.scrollTo(0, 0);
        }

        /**
         * LÓGICA: Enviar la acción de guardado (Sea registro o modificación) al backend
         */
        function procesarInscripcion() {
            const atletasData = obtenerListaAtletas();

            const payload = {
                comuna: document.getElementById('comuna').value.trim(),
                disciplina: document.getElementById('disciplina').value.trim(),
                categoria: document.getElementById('categoria').value.trim(),
                delegado: document.getElementById('delegado').value.trim(),
                cedulaDelegado: document.getElementById('cedulaDelegado').value.trim(),
                telDelegado: document.getElementById('telDelegado').value.trim(),
                atletas: atletasData
            };

            let endpoint = '/api/registrar-comuna';

            if (modoEdicionActive) {
                payload.comunaOriginal = comunaOriginalGlobal;
                payload.disciplinaOriginal = disciplinaOriginalGlobal;
                payload.categoriaOriginal = categoriaOriginalGlobal;
                endpoint = '/api/modificar-comuna';
            }

            fetch(`${URL_SERVIDOR}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    alert(data.message);
                    resetearFormularioCompleto();
                    obtenerAtletasPalacio();
                } else {
                    alert("Error en validación: " + data.error);
                }
            })
            .catch(err => {
                console.error("Fallo de red:", err);
                alert("Error al guardar datos en el servidor local.");
            });
        }

        /**
         * LÓGICA: Eliminar nómina del archivo plano enviando las llaves de control
         */
        function eliminarInscripcion(comuna, disciplina, categoria) {
            if (!confirm(`¿Desea eliminar por completo la inscripción de la Comuna "${comuna}" en "${disciplina}" (${categoria})?`)) {
                return;
            }

            fetch(`${URL_SERVIDOR}/api/eliminar-comuna`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ comuna, disciplina, categoria })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    alert(data.message);
                    obtenerAtletasPalacio();
                } else {
                    alert("Error al procesar baja: " + data.error);
                }
            })
            .catch(err => {
                console.error("Error en petición eliminar:", err);
                alert("No se pudo conectar con el servidor local para procesar la baja.");
            });
        }

        /**
         * LÓGICA: Exportar la tabla visible directamente a un archivo de Excel puro (.xlsx)
         */
        function exportarExcelFiltrado() {
            const tablaHtml = document.getElementById("tablaAtletasMaestra");
            if (!tablaHtml) {
                alert("No hay una estructura de datos procesable para exportar.");
                return;
            }

            // Crear una copia temporal de la tabla para quitar la columna de acciones (los botones) del Excel
            const tablaCopia = tablaHtml.cloneNode(true);
            const filas = tablaCopia.querySelectorAll("tr");
            filas.forEach(fila => {
                if (fila.lastElementChild) {
                    fila.removeChild(fila.lastElementChild); // Quita la columna de botones "Editar/Eliminar"
                }
            });

            const libroTrabajo = XLSX.utils.table_to_book(tablaCopia, { sheet: "Juegos Palacio del Deporte" });
            XLSX.writeFile(libroTrabajo, "Inscripciones_Juegos_Comunales_Guaicaipuro.xlsx");
        }

        /**
         * LÓGICA: Limpiar formulario y restablecer estados base
         */
        function resetearFormularioCompleto() {
            modoEdicionActive = false;
            document.getElementById("formularioInscripcion").reset();
            document.getElementById('formTitulo').innerText = "Formulario de Inscripción Oficial";
            document.getElementById('btnFinalizarRegistro').innerText = "Finalizar Registro";
            document.getElementById('btnFinalizarRegistro').className = "btn btn-primary px-5";
            
            // Reestablecer a una sola fila en blanco para atletas
            const contenedor = document.getElementById("contenedorAtletas");
            contenedor.innerHTML = "";
            agregarFilaAtleta();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripciones - Juegos Comunales 2025</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        .atleta-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .atleta-row input { flex: 1; }
        .atleta-row input.edad-input { flex: 0.3; }
        button { padding: 10px 15px; background: blue; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: darkblue; }
        .btn-danger { background: red; }
        .btn-danger:hover { background: darkred; }
        .btn-warning { background: orange; color: black; margin-right: 5px; }
        .btn-warning:hover { background: darkorange; }
        .admin-section { margin-top: 40px; padding: 20px; border-top: 2px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
        .alerta-edicion { background: #fff3cd; color: #856404; padding: 10px; border: 1px solid #ffeeba; margin-bottom: 15px; text-align: center; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Inscripción - Juegos Comunales 2025</h2>
    
    <div id="alerta-edicion" class="alerta-edicion">
        🔄 MODIFICANDO REGISTRO SELECCIONADO
    </div>

    <form id="registroForm" onsubmit="enviarDatos(event)">
        <div class="form-group">
            <label>Comuna:</label>
            <input type="text" id="comuna" required>
        </div>
        <div class="form-group">
            <label>Nombre del Delegado:</label>
            <input type="text" id="delegado" required>
        </div>
        <div class="form-group">
            <label>Cédula del Delegado:</label>
            <input type="text" id="cedula" required placeholder="V-00000000">
        </div>
        <div class="form-group">
            <label>Teléfono del Delegado:</label>
            <input type="tel" id="telefonoDelegado" required placeholder="Ej. 0412-1234567">
        </div>
        <div class="form-group">
            <label>Teléfono de Contacto (Emergencia):</label>
            <input type="tel" id="telefonoContacto" required placeholder="Ej. 0424-7654321">
        </div>
        <div class="form-group">
            <label>Disciplina:</label>
            <select id="disciplina" required>
                <option value="Fútbol Sala">Fútbol Sala</option>
                <option value="Baloncesto">Baloncesto</option>
                <option value="Voleibol">Voleibol</option>
                <option value="Kickingball">Kickingball</option>
            </select>
        </div>
        <div class="form-group">
            <label>Categoría:</label>
            <select id="categoria" required>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="Libre">Libre</option>
            </select>
        </div>

        <h3>Atletas (Máximo 12)</h3>
        <div id="atletasContainer"></div>
        <button type="button" onclick="agregarAtleta()">+ Agregar Atleta</button>
        <br><br>
        
        <button type="submit" id="btn-registrar">Finalizar Registro</button>
        <button type="button" id="btn-cancelar" class="btn-danger" style="display:none; margin-top:5px; width:100%;" onclick="cancelarModificacion()">Cancelar Modificación</button>
    </form>

    <div class="admin-section">
        <h3>Panel Personal Palacio del Deporte</h3>
        <div id="loginAdmin">
            <input type="password" id="passAdmin" placeholder="Contraseña de administración">
            <button type="button" onclick="verificarPassword()">Acceder</button>
        </div>

        <div id="panelAdmin" style="display: none; margin-top: 20px;">
            <h4>Registros Guardados</h4>
            
            <div class="form-group">
                <input type="text" id="buscador-cedula" placeholder="🔍 Buscar por Cédula del Delegado..." onkeyup="filtrarPorCedula()">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Comuna</th>
                        <th>Delegado (C.I.)</th>
                        <th>Teléfonos</th>
                        <th>Deporte (Cat.)</th>
                        <th>Atletas</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaRegistros"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const URL_SERVIDOR = "https://ratios-nokia-accurate-mate.trycloudflare.com";
    
    let modoEdicion = false;
    let registroOriginal = { comuna: "", disciplina: "", categoria: "" };

    // Iniciar con 3 filas por defecto
    window.onload = function() {
        for (let i = 0; i < 3; i++) agregarAtleta();
    };

    function agregarAtleta(datosAtleta = null) {
        const container = document.getElementById('atletasContainer');
        if (container.children.length >= 12) return;

        const div = document.createElement('div');
        div.className = 'atleta-row';
        div.innerHTML = `
            <input type="text" placeholder="Nombre del Atleta" class="atleta-nombre" required value="${datosAtleta ? datosAtleta.nombre : ''}">
            <input type="text" placeholder="Cédula" class="atleta-cedula" required value="${datosAtleta ? datosAtleta.cedula : ''}">
            <input type="number" placeholder="Edad" class="atleta-edad edad-input" required min="5" max="99" value="${datosAtleta ? datosAtleta.edad : ''}">
        `;
        container.appendChild(div);
    }

    function obtenerAtletas() {
        const nombres = document.querySelectorAll('.atleta-nombre');
        const cedulas = document.querySelectorAll('.atleta-cedula');
        const edades = document.querySelectorAll('.atleta-edad');
        const lista = [];
        nombres.forEach((el, idx) => {
            if (el.value.trim() !== "") {
                lista.push({
                    nombre: el.value.trim(),
                    cedula: cedulas[idx].value.trim(),
                    edad: edades[idx].value.trim()
                });
            }
        });
        return lista;
    }

    async function enviarDatos(e) {
        e.preventDefault();
        const payload = {
            comuna: document.getElementById('comuna').value.trim(),
            delegado: document.getElementById('delegado').value.trim(),
            cedulaDelegado: document.getElementById('cedula').value.trim(),
            telefonoDelegado: document.getElementById('telefonoDelegado').value.trim(),
            telefonoContacto: document.getElementById('telefonoContacto').value.trim(),
            disciplina: document.getElementById('disciplina').value,
            categoria: document.getElementById('categoria').value,
            atletas: obtenerAtletas()
        };

        let endpoint = `${URL_SERVIDOR}/api/registrar-comuna`;

        if (modoEdicion) {
            endpoint = `${URL_SERVIDOR}/api/modificar-comuna`;
            payload.comunaOriginal = registroOriginal.comuna;
            payload.disciplinaOriginal = registroOriginal.disciplina;
            payload.categoriaOriginal = registroOriginal.categoria;
        }

        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert(modoEdicion ? "¡Registro modificado correctamente!" : "¡Datos guardados con éxito!");
                generarPDF(payload);
                
                if (modoEdicion) cancelarModificacion();
                else document.getElementById('registroForm').reset();

                if (document.getElementById('panelAdmin').style.display === 'block') {
                    cargarRegistros();
                }
            } else {
                const err = await res.json();
                alert("Error: " + err.error);
            }
        } catch (error) {
            alert("Error al conectar con el servidor.");
        }
    }

    function generarPDF(datos) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(16);
        doc.text("Comprobante de Inscripción - Juegos Comunales 2025", 10, 20);
        doc.setFontSize(12);
        doc.text(`Comuna: ${datos.comuna}`, 10, 35);
        doc.text(`Delegado: ${datos.delegado} (C.I: ${datos.cedulaDelegado})`, 10, 43);
        doc.text(`Teléfono Delegado: ${datos.telefonoDelegado}`, 10, 51);
        doc.text(`Teléfono Contacto: ${datos.telefonoContacto}`, 10, 59);
        doc.text(`Disciplina: ${datos.disciplina} - Categoría: ${datos.categoria}`, 10, 67);

        doc.text("Nómina de Atletas:", 10, 80);
        let y = 88;
        datos.atletas.forEach((atleta, i) => {
            doc.text(`${i + 1}. ${atleta.nombre} - C.I: ${atleta.cedula} - Edad: ${atleta.edad} años`, 10, y);
            y += 8;
        });

        doc.save(`Inscripcion_${datos.comuna}_${datos.disciplina}.pdf`);
    }

    function verificarPassword() {
        const pass = document.getElementById('passAdmin').value;
        if (pass === "palacio2026") {
            document.getElementById('loginAdmin').style.display = 'none';
            document.getElementById('panelAdmin').style.display = 'block';
            cargarRegistros();
        } else {
            alert("Contraseña incorrecta");
        }
    }

    async function cargarRegistros() {
        try {
            const res = await fetch(`${URL_SERVIDOR}/api/atletas-comunales`);
            const datos = await res.json();
            const tbody = document.getElementById('tablaRegistros');
            tbody.innerHTML = "";

            datos.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "fila-datos";
                tr.setAttribute("data-cedula", item.cedulaDelegado.toLowerCase().trim());

                let atletasStr = item.atletas.map(a => `• ${a.nombre} (${a.cedula}) - ${a.edad} añ.`).join('<br>');

                tr.innerHTML = `
                    <td>${item.comuna}</td>
                    <td>${item.delegado}<br><small>C.I: ${item.cedulaDelegado}</small></td>
                    <td><small>Telf: ${item.telefonoDelegado}<br>Emerg: ${item.telefonoContacto}</small></td>
                    <td>${item.disciplina}<br><small>(${item.categoria})</small></td>
                    <td>${atletasStr}</td>
                    <td>
                        <button class="btn-warning" onclick="cargarParaModificar(${JSON.stringify(item).replace(/"/g, '&quot;')})">Modificar</button>
                        <button class="btn-danger" onclick="eliminarRegistro('${item.comuna}', '${item.disciplina}', '${item.categoria}')">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error(error);
        }
    }

    function filtrarPorCedula() {
        const busqueda = document.getElementById("buscador-cedula").value.toLowerCase().trim();
        const filas = document.querySelectorAll(".fila-datos");

        filas.forEach(fila => {
            const cedulaDelegado = fila.getAttribute("data-cedula");
            if (cedulaDelegado.includes(busqueda)) {
                fila.style.display = "";
            } else {
                fila.style.display = "none";
            }
        });
    }

    function cargarParaModificar(item) {
        modoEdicion = true;
        registroOriginal = { comuna: item.comuna, disciplina: item.disciplina, categoria: item.categoria };

        document.getElementById('comuna').value = item.comuna;
        document.getElementById('delegado').value = item.delegado;
        document.getElementById('cedula').value = item.cedulaDelegado;
        document.getElementById('telefonoDelegado').value = item.telefonoDelegado || '';
        document.getElementById('telefonoContacto').value = item.telefonoContacto || '';
        document.getElementById('disciplina').value = item.disciplina;
        document.getElementById('categoria').value = item.categoria;

        const container = document.getElementById('atletasContainer');
        container.innerHTML = "";
        item.atletas.forEach(atleta => agregarAtleta(atleta));

        document.getElementById('alerta-edicion').style.display = "block";
        document.getElementById('btn-cancelar').style.display = "block";
        document.getElementById('btn-registrar').innerText = "Guardar Cambios";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarModificacion() {
        modoEdicion = false;
        registroOriginal = { comuna: "", disciplina: "", categoria: "" };
        
        document.getElementById('registroForm').reset();
        document.getElementById('atletasContainer').innerHTML = "";
        for (let i = 0; i < 3; i++) agregarAtleta();

        document.getElementById('alerta-edicion').style.display = "none";
        document.getElementById('btn-cancelar').style.display = "none";
        document.getElementById('btn-registrar').innerText = "Finalizar Registro";
    }

    async function eliminarRegistro(comuna, disciplina, categoria) {
        if (!confirm("¿Seguro que deseas eliminar este registro?")) return;
        try {
            const res = await fetch(`${URL_SERVIDOR}/api/eliminar-comuna`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ comuna, disciplina, categoria })
            });
            if (res.ok) {
                alert("Registro eliminado");
                cargarRegistros();
            }
        } catch (error) {
            alert("Error al eliminar");
        }
    }
</script>
</body>
</html>
